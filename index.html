<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keval Mobile Zone | Premium Production Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* ==========================================
           1. MASTER NEON DESIGN SYSTEM
           ========================================== */
        :root {
            --bg: #050508; --panel: #0d0d15; --cyan: #00f0ff;
            --green: #00ff88; --purple: #bc00ff; --red: #ff3366;
            --yellow: #ffcc00; --border: #1e1e30; --text: #f0f0ff;
            --text-dim: #8888aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }
        .hidden { display: none !important; }
        .container { padding: 20px; max-width: 1500px; margin: 0 auto; min-height: 85vh; }
        
        /* Navigation */
        .neon-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--panel); border-bottom: 2px solid var(--purple);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(188, 0, 255, 0.3);
        }
        .nav-title { font-size: 1.2rem; font-weight: 900; color: var(--cyan); letter-spacing: 2px; }

        /* Buttons */
        button { border: none; border-radius: 6px; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; }
        .btn-neon-cyan { background: var(--cyan); color: #000; box-shadow: 0 0 10px var(--cyan); }
        .btn-neon-green { background: var(--green); color: #000; }
        .btn-neon-purple { background: var(--purple); color: #fff; box-shadow: 0 0 10px var(--purple); }
        .btn-neon-icon { background: rgba(0,240,255,0.1); color: var(--cyan); border: 1px solid var(--cyan); }
        .btn-red-mini { background: var(--red); color: #fff; padding: 4px 8px; font-size: 0.7rem; }

        /* Inputs */
        .neon-input, .neon-select, .neon-area { 
            width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); 
            color: #fff; margin-bottom: 15px; border-radius: 8px; outline: none; 
        }
        .neon-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,240,255,0.2); }

        /* Grid & Cards */
        .neon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 15px; 
            padding: 20px; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s;
        }
        .card:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--purple); }
        .card-img-box { height: 200px; background: #000; display: flex; align-items: center; justify-content: center; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .card-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Comparison Dock */
        .compare-dock { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(13,13,21,0.95); 
            border-top: 2px solid var(--cyan); padding: 15px 25px; z-index: 1500; backdrop-filter: blur(10px);
        }
        .dock-items { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .dock-pill { background: #000; border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; }

        /* Modals */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: var(--panel); padding: 30px; border-radius: 15px; width: 100%; max-width: 850px; max-height: 92vh; overflow-y: auto; border: 1px solid var(--border); }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

        /* Detail View Layout */
        .detail-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        .main-frame { height: 400px; background: #000; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
        .thumb-row { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; }
        .thumb { width: 70px; height: 70px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; object-fit: cover; }
        .thumb.active { border-color: var(--cyan); }

        /* Admin/Ledger Rows */
        .admin-item { background: #11111d; padding: 18px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ledger-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .ledger-row.sale { border-left: 5px solid var(--red); background: rgba(255,51,102,0.05); }
        .ledger-row.purchase { border-left: 5px solid var(--green); background: rgba(0,255,136,0.05); }

        /* Matrix Table */
        .matrix-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .matrix-table th, .matrix-table td { padding: 15px; border: 1px solid var(--border); text-align: left; }
        .matrix-table th { background: #000; color: var(--cyan); }

        /* Footer */
        .neon-footer { text-align: center; padding: 50px; background: var(--panel); border-top: 1px solid var(--border); margin-top: 60px; }
        .credit-text { font-size: 1.1rem; font-weight: 900; color: var(--text); }
        .credit-text span { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        @media (max-width: 850px) { .detail-grid { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr !important; } .admin-item { flex-direction: column; text-align: center; gap: 15px; } }
    </style>
</head>
<body>

    <header class="neon-nav">
        <div class="nav-title">KEVAL MOBILE ZONE</div>
        <div class="nav-actions">
            <button id="btnAdminToggle" class="btn-neon-icon">⚙️ ADMIN CONTROL</button>
        </div>
    </header>

    <main id="userView" class="container">
        <div class="filter-bar" style="margin-bottom:30px;">
            <input type="text" id="userSearch" placeholder="Search Brand, Model, or Specs..." class="neon-input">
            <div style="display:flex; gap:10px;">
                <select id="userFilterCat" class="neon-select"><option value="">ALL CATEGORIES</option></select>
                <select id="userFilterBrand" class="neon-select"><option value="">ALL BRANDS</option></select>
            </div>
        </div>

        <div id="productGrid" class="neon-grid"></div>

        <div id="compareDock" class="compare-dock hidden">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:var(--cyan); font-weight:bold; font-size:0.8rem;">
                <span>COMPARE DECK (<span id="compCount">0</span>/5)</span>
                <button onclick="clearCompare()" class="btn-red-mini">✕ CLEAR</button>
            </div>
            <div id="dockItems" class="dock-items"></div>
            <button onclick="runMatrix()" class="btn-neon-purple full-w">📊 EXECUTE COMPARISON MATRIX</button>
        </div>
    </main>

    <main id="adminView" class="container hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="color:var(--cyan); letter-spacing:2px;">WAREHOUSE CONSOLE</h2>
            <div style="display:flex; gap:10px;">
                <button id="btnExportPDF" class="btn-neon-green">💾 EXPORT PDF</button>
                <button id="btnCreateEntry" class="btn-neon-cyan">+ NEW ITEM</button>
            </div>
        </div>
        <input type="text" id="adminSearch" placeholder="Filter inventory..." class="neon-input">
        <div id="adminList"></div>
    </main>

    <footer class="neon-footer">
        <p class="credit-text">Created By <span>Jigar</span> for Keval Mobile Zone Padra</p>
    </footer>

    <div id="pinGate" class="overlay hidden">
        <div class="modal" style="max-width:400px; text-align:center;">
            <h3 style="margin-bottom:20px;">🔒 ADMIN ACCESS</h3>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="neon-input" style="font-size:2.5rem; text-align:center; letter-spacing:10px;">
            <button onclick="verifyPin()" class="btn-neon-green full-w">VERIFY PIN</button>
        </div>
    </div>

    <div id="entryModal" class="overlay hidden">
        <div class="modal">
            <div class="modal-head">
                <h3 id="modalTitle">DATABASE ENTRY</h3>
                <button onclick="toggleModal('entryModal', false)" style="background:none; color:#fff; font-size:1.5rem;">✕</button>
            </div>
            <form id="productForm">
                <input type="hidden" id="editId">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <select id="pCat" class="neon-select" required>
                        <option value="MOBILE 📱">MOBILE 📱</option>
                        <option value="TV 📺">TV 📺</option>
                        <option value="FRIDGE ❄️">FRIDGE ❄️</option>
                        <option value="HOME THEATRE 🔊">HOME THEATRE 🔊</option>
                    </select>
                    <select id="pBrand" class="neon-select" required>
                        <option value="VIVO">VIVO</option>
                        <option value="OPPO">OPPO</option>
                        <option value="SAMSUNG">SAMSUNG</option>
                        <option value="REALME">REALME</option>
                        <option value="POCO">POCO</option>
                        <option value="REDMI MI">REDMI MI</option>
                        <option value="TECNO">TECNO</option>
                        <option value="1+ ONEPLUS">1+ ONEPLUS</option>
                    </select>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <input type="text" id="pSeries" placeholder="Series" class="neon-input">
                    <input type="text" id="pModel" placeholder="Model Name" class="neon-input" required>
                </div>
                <input type="text" id="pDealer" placeholder="Dealer Name" class="neon-input" required>
                
                <div style="background:#000; padding:15px; border-radius:8px; border:1px dashed var(--purple); margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span style="font-weight:bold; color:var(--purple);">HD IMAGES</span>
                        <button type="button" onclick="addColor()" class="btn-neon-purple" style="padding:5px 10px; font-size:0.6rem;">+ ADD PHOTO</button>
                    </div>
                    <div id="colorContainer"></div>
                </div>

                <div style="background:#000; padding:15px; border-radius:8px; border:1px solid var(--border); margin-bottom:15px;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="vName" placeholder="RAM/ROM" class="neon-input" style="flex:2;">
                        <input type="number" id="vPrice" placeholder="Price" class="neon-input" style="flex:1;">
                        <input type="number" id="vStock" placeholder="Stock" class="neon-input" style="flex:1;">
                        <button type="button" onclick="addVariant()" class="btn-neon-cyan" style="height:48px;">ADD</button>
                    </div>
                    <div id="variantPills" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;"></div>
                </div>

                <textarea id="pSpecs" placeholder="Paste Specs (One per line)..." class="neon-area" rows="4"></textarea>
                <button type="submit" class="btn-neon-cyan full-w" style="padding:15px; font-size:1rem; box-shadow: 0 0 20px var(--purple);">PUBLISH TO SHOP ENGINE</button>
            </form>
        </div>
    </div>

    <div id="ledgerModal" class="overlay hidden">
        <div class="modal">
            <div class="modal-head"><h3>WAREHOUSE AUDIT LEDGER</h3><button onclick="toggleModal('ledgerModal', false)">✕</button></div>
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:10px; border:1px solid var(--purple); margin-bottom:20px;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
                    <select id="lVar" class="neon-select"></select>
                    <select id="lType" class="neon-select"><option value="PURCHASE">STOCK IN (+)</option><option value="SALE">STOCK OUT (-)</option></select>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="number" id="lQty" placeholder="Quantity" class="neon-input" value="1">
                    <input type="text" id="lNote" placeholder="Note (Invoice/Customer)" class="neon-input">
                </div>
                <button onclick="commitLedger()" class="btn-neon-green full-w">SAVE TRANSACTION</button>
            </div>
            <div id="ledgerHistory"></div>
        </div>
    </div>

    <div id="detailModal" class="overlay hidden">
        <div class="modal" style="max-width:1100px;">
            <button onclick="toggleModal('detailModal', false)" style="float:right; background:none; color:#fff; font-size:1.5rem;">✕</button>
            <div class="detail-grid">
                <div class="detail-visuals">
                    <div class="main-frame"><img id="dMainImg" src=""></div>
                    <div id="dThumbs" class="thumb-row"></div>
                </div>
                <div class="detail-info">
                    <div id="dCat" style="color:var(--cyan); font-weight:bold; font-size:0.8rem;"></div>
                    <h2 id="dTitle" style="font-size:2.2rem; font-weight:900; margin:10px 0;"></h2>
                    <div id="dPrice" style="font-size:2.5rem; color:var(--green); font-weight:900; margin-bottom:20px;"></div>
                    <div style="margin-bottom:20px;"><label style="font-size:0.7rem; color:var(--text-dim);">VARIANTS:</label><div id="dVariants" style="display:flex; gap:10px; margin-top:5px;"></div></div>
                    <div style="background:rgba(0,255,136,0.1); padding:15px; border-radius:8px; border:1px solid var(--green); margin-bottom:20px;">
                        STOCK: <span id="dStock" style="font-weight:900; font-size:1.2rem;"></span>
                    </div>
                    <div id="dSpecs" style="border-top:1px solid var(--border); padding-top:20px;"></div>
                    <div style="margin-top:20px; font-weight:bold; color:var(--cyan);">DEALER: <span id="dDealer"></span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="matrixModal" class="overlay hidden">
        <div class="modal" style="max-width:1300px;">
            <div class="modal-head"><h3>COMPARISON MATRIX</h3><button onclick="toggleModal('matrixModal', false)">✕</button></div>
            <div id="matrixBody" style="overflow-x:auto;"></div>
        </div>
    </div>

    <script>
        /* CONFIGURATION */
        const firebaseConfig = {
            apiKey: "AIzaSyDcesyj1CJkNpkZVdFb2-k5pXwg-nW8uiQ",
            authDomain: "keval-mobile-zone.firebaseapp.com",
            databaseURL: "https://keval-mobile-zone-default-rtdb.firebaseio.com",
            projectId: "keval-mobile-zone",
            storageBucket: "keval-mobile-zone.firebasestorage.app",
            messagingSenderId: "617707071181",
            appId: "1:617707071181:web:78123529b66d61d58e6b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const CLOUD = "dgpk8n8xv";
        const PRESET = "keval_shop_preset";

        /* STATE */
        let products = [];
        let isAdmin = false;
        let vDraft = [];
        let cDraft = [];
        let compareQueue = [];
        let activeID = null;

        /* INITIAL SYNC */
        db.ref('products').on('value', snap => {
            products = [];
            const data = snap.val();
            if(data) Object.keys(data).forEach(k => products.push({id: k, ...data[k]}));
            buildFilters();
            isAdmin ? renderAdmin() : renderUser();
        });

        /* UI CONTROLS */
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function renderUser() {
            const grid = document.getElementById('productGrid');
            const q = document.getElementById('userSearch').value.toLowerCase();
            const cat = document.getElementById('userFilterCat').value;
            const brand = document.getElementById('userFilterBrand').value;
            grid.innerHTML = '';

            products.filter(p => {
                return (p.model.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q)) &&
                       (cat === "" || p.category === cat) && (brand === "" || p.brand === brand);
            }).forEach(p => {
                const img = p.colors?.[0]?.url || '';
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-box" onclick="viewDetails('${p.id}')"><img src="${img}"></div>
                    <div style="color:var(--cyan); font-size:0.7rem; font-weight:bold;">${p.brand} • ${p.series}</div>
                    <h3 onclick="viewDetails('${p.id}')">${p.model}</h3>
                    <div style="font-size:1.8rem; color:var(--green); font-weight:900;">₹${parseInt(p.variants[0].price).toLocaleString('en-IN')}</div>
                    <button onclick="addToCompare('${p.id}')" class="btn-neon-icon full-w" style="margin-top:10px;">⚖️ COMPARE</button>
                `;
                grid.appendChild(card);
            });
        }

        function renderAdmin() {
            const list = document.getElementById('adminList');
            const q = document.getElementById('adminSearch').value.toLowerCase();
            list.innerHTML = '';
            products.filter(p => p.model.toLowerCase().includes(q)).forEach(p => {
                const item = document.createElement('div');
                item.className = 'admin-item';
                item.innerHTML = `
                    <div style="flex:1;"><strong>${p.brand} ${p.model}</strong><br><small>Dealer: ${p.dealer}</small></div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="number" value="${p.variants[0].price}" class="neon-input" style="width:110px; margin:0;" onchange="quickPrice('${p.id}', this.value)">
                        <button onclick="manageL('${p.id}')" class="btn-neon-purple">📦</button>
                        <button onclick="editP('${p.id}')" class="btn-neon-cyan">✏️</button>
                        <button onclick="deleteP('${p.id}')" style="background:var(--red); color:#fff;">🗑️</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        /* ADMIN FUNCTIONS */
        function verifyPin() {
            if(document.getElementById('pinInput').value === "1234") {
                isAdmin = true;
                toggleModal('pinGate', false);
                document.getElementById('adminView').classList.remove('hidden');
                document.getElementById('userView').classList.add('hidden');
                document.getElementById('btnAdminToggle').innerText = "🏠 SHOP VIEW";
                renderAdmin();
            } else { alert("ACCESS DENIED"); }
        }

        document.getElementById('btnAdminToggle').onclick = () => {
            if(isAdmin) {
                isAdmin = false;
                document.getElementById('adminView').classList.add('hidden');
                document.getElementById('userView').classList.remove('hidden');
                document.getElementById('btnAdminToggle').innerText = "⚙️ ADMIN CONTROL";
                renderUser();
            } else { toggleModal('pinGate', true); }
        };

        /* IMAGE HANDLING */
        async function addColor() {
            const name = prompt("Color Name (e.g. Sierra Blue):");
            if(!name) return;
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = async () => {
                const formData = new FormData();
                formData.append('file', input.files[0]);
                formData.append('upload_preset', PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                cDraft.push({ name, url: data.secure_url });
                renderCDraft();
            };
            input.click();
        }

        function renderCDraft() {
            document.getElementById('colorContainer').innerHTML = cDraft.map((c, i) => `
                <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                    <img src="${c.url}" width="30"> <span>${c.name}</span>
                    <button type="button" onclick="cDraft.splice(${i},1);renderCDraft();" class="btn-red-mini">✕</button>
                </div>
            `).join('');
        }

        /* VARIANT HANDLING */
        function addVariant() {
            const n = document.getElementById('vName').value;
            const p = document.getElementById('vPrice').value;
            const s = document.getElementById('vStock').value;
            if(n && p) { vDraft.push({name: n, price: p, stock: s || 0}); renderVDraft(); }
        }

        function renderVDraft() {
            document.getElementById('variantPills').innerHTML = vDraft.map((v, i) => `
                <span class="dock-pill" onclick="vDraft.splice(${i},1);renderVDraft();">${v.name} - ₹${v.price} ✕</span>
            `).join('');
        }

        /* FORM SUBMIT */
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value || "PROD_" + Date.now();
            const data = {
                id, category: document.getElementById('pCat').value, brand: document.getElementById('pBrand').value,
                series: document.getElementById('pSeries').value, model: document.getElementById('pModel').value,
                dealer: document.getElementById('pDealer').value, specs: document.getElementById('pSpecs').value.split('\n').filter(s=>s.trim()),
                variants: vDraft, colors: cDraft, ledger: products.find(x => x.id === id)?.ledger || []
            };
            await db.ref('products/' + id).set(data);
            toggleModal('entryModal', false);
            resetForm();
        };

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('editId').value = "";
            vDraft = []; cDraft = [];
            renderVDraft(); renderCDraft();
        }

        /* LEDGER ENGINE (STOCK REVERSION) */
        function manageL(id) {
            activeID = id;
            const p = products.find(x => x.id === id);
            document.getElementById('lVar').innerHTML = p.variants.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
            renderLedgerHistory(p);
            toggleModal('ledgerModal', true);
        }

        async function commitLedger() {
            const p = products.find(x => x.id === activeID);
            const idx = document.getElementById('lVar').value;
            const qty = parseInt(document.getElementById('lQty').value);
            const type = document.getElementById('lType').value;
            if(type === 'SALE') p.variants[idx].stock = parseInt(p.variants[idx].stock) - qty;
            else p.variants[idx].stock = parseInt(p.variants[idx].stock) + qty;
            if(!p.ledger) p.ledger = [];
            p.ledger.push({ type, qty, variant: p.variants[idx].name, date: new Date().toLocaleDateString(), note: document.getElementById('lNote').value });
            await db.ref('products/' + activeID).set(p);
            manageL(activeID);
        }

        async function undoLedger(prodId, index) {
            const p = products.find(x => x.id === prodId);
            const log = p.ledger[index];
            const vIdx = p.variants.findIndex(v => v.name === log.variant);
            if(vIdx > -1) {
                if(log.type === 'SALE') p.variants[vIdx].stock = parseInt(p.variants[vIdx].stock) + log.qty;
                else p.variants[vIdx].stock = parseInt(p.variants[vIdx].stock) - log.qty;
            }
            p.ledger.splice(index, 1);
            await db.ref('products/' + prodId).set(p);
            manageL(prodId);
        }

        function renderLedgerHistory(p) {
            document.getElementById('ledgerHistory').innerHTML = (p.ledger || []).slice().reverse().map((l, i) => {
                const realIdx = p.ledger.length - 1 - i;
                return `
                    <div class="ledger-row ${l.type.toLowerCase()}">
                        <span>${l.type}: ${l.qty} (${l.variant})</span>
                        <button onclick="undoLedger('${p.id}', ${realIdx})" class="btn-red-mini">UNDO</button>
                    </div>
                `;
            }).join('');
        }

        /* MATRIX ENGINE */
        function addToCompare(id) {
            if(compareQueue.includes(id) || compareQueue.length >= 5) return;
            compareQueue.push(id);
            updateDock();
        }

        function updateDock() {
            const dock = document.getElementById('compareDock');
            document.getElementById('compCount').innerText = compareQueue.length;
            compareQueue.length > 0 ? dock.classList.remove('hidden') : dock.classList.add('hidden');
            document.getElementById('dockItems').innerHTML = compareQueue.map(id => {
                const p = products.find(x => x.id === id);
                return `<div class="dock-pill">${p.model} <span onclick="removeFromCompare('${id}')" style="color:red; cursor:pointer;">✕</span></div>`;
            }).join('');
        }

        function removeFromCompare(id) { compareQueue = compareQueue.filter(x => x !== id); updateDock(); }
        function clearCompare() { compareQueue = []; updateDock(); }

        function runMatrix() {
            const body = document.getElementById('matrixBody');
            const items = compareQueue.map(id => products.find(x => x.id === id));
            let head = '<th>Specs</th>', brands = '<td>Brand</td>', prices = '<td>Price</td>', specs = '<td>Specs</td>';
            items.forEach(p => {
                head += `<th><img src="${p.colors[0].url}" style="width:70px;"><br>${p.model}</th>`;
                brands += `<td>${p.brand}</td>`;
                prices += `<td>₹${p.variants[0].price}</td>`;
                specs += `<td>${p.specs.join('<br>')}</td>`;
            });
            body.innerHTML = `<table class="matrix-table"><thead><tr>${head}</tr></thead><tbody><tr>${brands}</tr><tr>${prices}</tr><tr>${specs}</tr></tbody></table>`;
            toggleModal('matrixModal', true);
        }

        /* DETAIL VIEW */
        function viewDetails(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('dTitle').innerText = p.model;
            document.getElementById('dCat').innerText = p.category;
            document.getElementById('dPrice').innerText = `₹${parseInt(p.variants[0].price).toLocaleString('en-IN')}`;
            document.getElementById('dStock').innerText = p.variants[0].stock;
            document.getElementById('dDealer').innerText = p.dealer;
            document.getElementById('dMainImg').src = p.colors[0].url;
            document.getElementById('dThumbs').innerHTML = p.colors.map(c => `<img src="${c.url}" class="thumb" onclick="document.getElementById('dMainImg').src='${c.url}'">`).join('');
            document.getElementById('dSpecs').innerHTML = p.specs.map(s => `<div>⚡ ${s}</div>`).join('');
            document.getElementById('dVariants').innerHTML = p.variants.map((v, i) => `<button class="btn-neon-icon" onclick="updateDPrice('${v.price}', '${v.stock}')">${v.name}</button>`).join('');
            toggleModal('detailModal', true);
        }

        function updateDPrice(p, s) { document.getElementById('dPrice').innerText = `₹${parseInt(p).toLocaleString('en-IN')}`; document.getElementById('dStock').innerText = s; }

        /* UTILS */
        function quickPrice(id, val) { const p = products.find(x => x.id === id); p.variants[0].price = val; db.ref('products/' + id).set(p); }
        function deleteP(id) { if(confirm("Delete product?")) db.ref('products/' + id).remove(); }
        function editP(id) {
            const p = products.find(x => x.id === id);
            resetForm();
            document.getElementById('editId').value = p.id;
            document.getElementById('pCat').value = p.category;
            document.getElementById('pBrand').value = p.brand;
            document.getElementById('pSeries').value = p.series;
            document.getElementById('pModel').value = p.model;
            document.getElementById('pDealer').value = p.dealer;
            document.getElementById('pSpecs').value = p.specs.join('\n');
            vDraft = [...p.variants];
            cDraft = [...p.colors];
            renderVDraft(); renderCDraft();
            toggleModal('entryModal', true);
        }

        function buildFilters() {
            const cats = [...new Set(products.map(p => p.category))];
            const brands = [...new Set(products.map(p => p.brand))];
            document.getElementById('userFilterCat').innerHTML = '<option value="">ALL CATEGORIES</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('userFilterBrand').innerHTML = '<option value="">ALL BRANDS</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
        }

        document.getElementById('userSearch').oninput = renderUser;
        document.getElementById('adminSearch').oninput = renderAdmin;
        document.getElementById('btnCreateEntry').onclick = () => { resetForm(); toggleModal('entryModal', true); };
        document.getElementById('btnExportPDF').onclick = () => { html2pdf().from(document.getElementById('adminList')).save(`Inventory_${Date.now()}.pdf`); };
    </script>
</body>
</html>
